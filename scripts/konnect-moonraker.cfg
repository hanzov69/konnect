# Snippet for moonraker.conf — gives Moonraker's update_manager the
# git repo info so a `moonraker-update` call picks up new releases.
#
# The install script appends this with a begin/end marker block so the
# uninstaller can remove it cleanly.
#
# NOTE: we deliberately do NOT touch [authorization]. Konnect's web UI
# is served same-origin via the nginx /konnect/ proxy, so no cors_domains
# changes are required. If you want to expose the API to other hosts
# (e.g. a separate KlipperScreen unit), add those cors_domains to your
# existing [authorization] section manually.

[update_manager konnect]
type: git_repo
path: ~/konnect
origin: https://github.com/konnect-dev/konnect.git
primary_branch: main
virtualenv: ~/konnect-env
requirements: requirements.txt
managed_services: konnect
