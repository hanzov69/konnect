# konnect — KlipperScreen menu entry
#
# Installed by scripts/install.sh to:
#   ~/printer_data/config/KlipperScreen-konnect.conf
#
# The install script also appends one `include` line to KlipperScreen.conf
# so this file is picked up. Add or adjust the entry location if you
# want the Prusa Connect menu item somewhere else (e.g. inside `__main
# network` or `__main settings`).

[menu __main konnect]
name: {{ gettext('Prusa Connect') }}
icon: network
panel: konnect

[menu __splashscreen konnect]
name: {{ gettext('Prusa Connect') }}
icon: network
panel: konnect
